<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora FullStack | Engineering Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="calculator-body">
        <div class="display">
            <div id="screen">0</div>
        </div>

        <div class="keypad">
            <button class="btn-tool" onclick="clearScreen()">C</button>
            <button class="btn-op" onclick="addChar('(')">(</button>
            <button class="btn-op" onclick="addChar(')')">)</button>
            <button class="btn-op" onclick="addChar('/')">÷</button>

            <button onclick="addChar('7')">7</button>
            <button onclick="addChar('8')">8</button>
            <button onclick="addChar('9')">9</button>
            <button class="btn-op" onclick="addChar('*')">×</button>

            <button onclick="addChar('4')">4</button>
            <button onclick="addChar('5')">5</button>
            <button onclick="addChar('6')">6</button>
            <button class="btn-op" onclick="addChar('-')">−</button>

            <button onclick="addChar('1')">1</button>
            <button onclick="addChar('2')">2</button>
            <button onclick="addChar('3')">3</button>
            <button class="btn-op" onclick="addChar('+')">+</button>

            <button onclick="addChar('0')">0</button>
            <button onclick="addChar('.')">.</button>
            <button class="btn-equal" onclick="sendToBackend()">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
